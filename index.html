<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>runnit</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  background:#0f172a;
  color:white;
  padding:20px;
}

.container{
  max-width:1200px;
  margin:auto;
}

.header{
  margin-bottom:25px;
}

.header h1{
  font-size:42px;
}

.header p{
  color:#94a3b8;
  margin-top:8px;
}

.grid{
  display:grid;
  grid-template-columns:350px 1fr;
  gap:20px;
}

.card{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:24px;
  padding:24px;
  margin-bottom:20px;
}

.card-title{
  font-size:22px;
  margin-bottom:20px;
  font-weight:700;
}

.form-grid{
  display:grid;
  gap:14px;
}

select,input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  font-size:15px;
}

select:focus,
input:focus{
  outline:none;
  border-color:#2563eb;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:18px;
}

button{
  border:none;
  padding:14px;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  flex:1;
}

.save-btn{
  background:#2563eb;
  color:white;
}

.reset-btn{
  background:#dc2626;
  color:white;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:20px;
}

.stat-box{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:18px;
  padding:20px;
}

.stat-box p{
  color:#94a3b8;
  font-size:14px;
}

.stat-box h2{
  margin-top:10px;
  font-size:28px;
}

.status{
  margin-top:15px;
  text-align:center;
  color:#94a3b8;
}

canvas{
  background:#0f172a;
  border-radius:20px;
  padding:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px 0;
  border-bottom:1px solid #334155;
  text-align:left;
}

th{
  color:#94a3b8;
  font-size:14px;
}

#map{
  height:400px;
  border-radius:20px;
  overflow:hidden;
}

@media(max-width:900px){

  .grid{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:600px){

  .stats{
    grid-template-columns:1fr;
  }

  .buttons{
    flex-direction:column;
  }
}

</style>

</head>

<body>

<div class="container">

  <div class="header">
    <h1>runnit</h1>
    <p>Offline sports tracker with GPS</p>
  </div>

  <div class="grid">

    <div>

      <div class="card">

        <div class="card-title">
          Add Activity
        </div>

        <form id="activityForm">

          <div class="form-grid">

            <input type="date" id="date" required>

            <select id="sport" required>

              <option value="">Choose Sport</option>

              <option value="Running">Running</option>

              <option value="Walking">Walking</option>

              <option value="Cycling">Cycling</option>

              <option value="Swimming">Swimming</option>

              <option value="Aquathon">Aquathon</option>

              <option value="Cyclothon">Cyclothon</option>

              <option value="Triathlon">Triathlon</option>

            </select>

            <div id="normalFields">

              <input
              type="number"
              id="distance"
              placeholder="Distance"
              step="0.1">

            </div>

            <div
            id="multiFields"
            style="display:none;">

              <input
              type="number"
              id="runDistance"
              placeholder="Running KM"
              step="0.1">

              <input
              type="number"
              id="cycleDistance"
              placeholder="Cycling KM"
              step="0.1">

              <input
              type="number"
              id="swimDistance"
              placeholder="Swimming Meters"
              step="1">

            </div>

            <input
            type="number"
            id="runtime"
            placeholder="Time (minutes)"
            step="0.1"
            required>

            <input
            type="text"
            id="pace"
            placeholder="Pace"
            readonly>

          </div>

          <div class="buttons">

            <button
            type="submit"
            class="save-btn">

              Save

            </button>

            <button
            type="button"
            class="reset-btn"
            onclick="resetData()">

              Reset

            </button>

          </div>

          <div
          class="status"
          id="status"></div>

        </form>

      </div>

      <div class="card">

        <div class="card-title">
          Live GPS Tracking
        </div>

        <div id="map"></div>

        <div class="buttons">

          <button
          class="save-btn"
          onclick="startTracking()">

            Start GPS

          </button>

          <button
          class="reset-btn"
          onclick="stopTracking()">

            Stop GPS

          </button>

        </div>

      </div>

    </div>

    <div>

      <div class="stats">

        <div class="stat-box">
          <p>Total Activities</p>
          <h2 id="totalActivities">0</h2>
        </div>

        <div class="stat-box">
          <p>Total Distance</p>
          <h2 id="totalDistance">0 km</h2>
        </div>

        <div class="stat-box">
          <p>Total Time</p>
          <h2 id="totalTime">0 min</h2>
        </div>

        <div class="stat-box">
          <p>Average Pace</p>
          <h2 id="avgPace">0</h2>
        </div>

      </div>

      <div class="card">

        <div class="card-title">
          Analytics
        </div>

        <canvas id="chart"></canvas>

      </div>

      <div class="card">

        <div class="card-title">
          History
        </div>

        <table>

          <thead>

            <tr>

              <th>Date</th>

              <th>Sport</th>

              <th>Distance</th>

              <th>Time</th>

              <th>Pace</th>

            </tr>

          </thead>

          <tbody id="history"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script>

const form =
document.getElementById('activityForm');

const sportSelect =
document.getElementById('sport');

let activities =
JSON.parse(
localStorage.getItem('activities')
) || [];

document.getElementById('date').value =
new Date().toISOString().split('T')[0];

sportSelect.addEventListener('change',()=>{

  const sport = sportSelect.value;

  if(
    sport === 'Triathlon' ||
    sport === 'Aquathon' ||
    sport === 'Cyclothon'
  ){

    document.getElementById('normalFields')
      .style.display = 'none';

    document.getElementById('multiFields')
      .style.display = 'block';

  }else{

    document.getElementById('normalFields')
      .style.display = 'block';

    document.getElementById('multiFields')
      .style.display = 'none';

    if(sport === 'Swimming'){

      document.getElementById('distance')
        .placeholder = 'Distance (meters)';

    }else{

      document.getElementById('distance')
        .placeholder = 'Distance (km)';
    }
  }

  calculatePace();
});

function calculatePace(){

  const sport =
  sportSelect.value;

  const runtime =
  parseFloat(
    document.getElementById('runtime').value
  );

  let distance = 0;

  if(sport === 'Triathlon'){

    distance =
      parseFloat(document.getElementById('runDistance').value || 0) +
      parseFloat(document.getElementById('cycleDistance').value || 0) +
      (
        parseFloat(document.getElementById('swimDistance').value || 0)
        /1000
      );

  }else if(sport === 'Aquathon'){

    distance =
      parseFloat(document.getElementById('runDistance').value || 0) +
      (
        parseFloat(document.getElementById('swimDistance').value || 0)
        /1000
      );

  }else if(sport === 'Cyclothon'){

    distance =
      parseFloat(document.getElementById('runDistance').value || 0) +
      parseFloat(document.getElementById('cycleDistance').value || 0);

  }else{

    distance =
      parseFloat(
        document.getElementById('distance').value || 0
      );

    if(sport === 'Swimming'){
      distance = distance / 1000;
    }
  }

  if(distance && runtime){

    document.getElementById('pace').value =
      (runtime/distance).toFixed(2)+' min/km';
  }
}

[
'distance',
'runtime',
'runDistance',
'cycleDistance',
'swimDistance'
]
.forEach(id=>{

  document.getElementById(id)
    .addEventListener('input',calculatePace);
});

form.addEventListener('submit',function(e){

  e.preventDefault();

  const sport =
  sportSelect.value;

  let distanceText = '';
  let totalDistance = 0;

  if(sport === 'Triathlon'){

    const run =
    parseFloat(document.getElementById('runDistance').value || 0);

    const cycle =
    parseFloat(document.getElementById('cycleDistance').value || 0);

    const swim =
    parseFloat(document.getElementById('swimDistance').value || 0);

    distanceText =
    `Run ${run} km | Cycle ${cycle} km | Swim ${swim} m`;

    totalDistance =
    run + cycle + (swim/1000);

  }

  else if(sport === 'Aquathon'){

    const run =
    parseFloat(document.getElementById('runDistance').value || 0);

    const swim =
    parseFloat(document.getElementById('swimDistance').value || 0);

    distanceText =
    `Run ${run} km | Swim ${swim} m`;

    totalDistance =
    run + (swim/1000);

  }

  else if(sport === 'Cyclothon'){

    const run =
    parseFloat(document.getElementById('runDistance').value || 0);

    const cycle =
    parseFloat(document.getElementById('cycleDistance').value || 0);

    distanceText =
    `Run ${run} km | Cycle ${cycle} km`;

    totalDistance =
    run + cycle;

  }

  else if(sport === 'Swimming'){

    const swim =
    parseFloat(document.getElementById('distance').value || 0);

    distanceText = swim+' m';

    totalDistance = swim/1000;
  }

  else{

    totalDistance =
    parseFloat(
      document.getElementById('distance').value || 0
    );

    distanceText =
    totalDistance+' km';
  }

  const item = {

    date:
    document.getElementById('date').value,

    sport:sport,

    distance:distanceText,

    totalDistance:totalDistance,

    runtime:
    document.getElementById('runtime').value,

    pace:
    document.getElementById('pace').value
  };

  activities.push(item);

  localStorage.setItem(
    'activities',
    JSON.stringify(activities)
  );

  renderHistory();
  updateStats();
  updateChart();

  form.reset();

  document.getElementById('date').value =
  new Date().toISOString().split('T')[0];

  document.getElementById('status').innerText =
  'Saved successfully';
});

function renderHistory(){

  const history =
  document.getElementById('history');

  history.innerHTML = '';

  [...activities]
  .reverse()
  .forEach(item=>{

    history.innerHTML += `

    <tr>

      <td>${item.date}</td>

      <td>${item.sport}</td>

      <td>${item.distance}</td>

      <td>${item.runtime} min</td>

      <td>${item.pace}</td>

    </tr>

    `;
  });
}

function updateStats(){

  document.getElementById('totalActivities').innerText =
  activities.length;

  const totalDistance =
  activities.reduce(
    (sum,item)=>sum+parseFloat(item.totalDistance||0),
    0
  );

  const totalTime =
  activities.reduce(
    (sum,item)=>sum+parseFloat(item.runtime||0),
    0
  );

  const avgPace =
  activities.length
  ? (
    activities.reduce(
      (sum,item)=>sum+parseFloat(item.pace||0),
      0
    ) / activities.length
  ).toFixed(2)
  : 0;

  document.getElementById('totalDistance').innerText =
  totalDistance.toFixed(1)+' km';

  document.getElementById('totalTime').innerText =
  totalTime.toFixed(0)+' min';

  document.getElementById('avgPace').innerText =
  avgPace+' min';
}

let chart;

function updateChart(){

  const labels =
  activities.map(item=>item.date);

  const distances =
  activities.map(item=>item.totalDistance);

  if(chart){
    chart.destroy();
  }

  chart = new Chart(

    document.getElementById('chart'),

    {

      type:'line',

      data:{

        labels:labels,

        datasets:[{

          label:'Distance',

          data:distances,

          borderWidth:3,

          tension:0.4
        }]
      },

      options:{

        responsive:true,

        plugins:{
          legend:{
            labels:{
              color:'white'
            }
          }
        },

        scales:{

          x:{
            ticks:{
              color:'#94a3b8'
            }
          },

          y:{
            ticks:{
              color:'#94a3b8'
            }
          }
        }
      }
    }
  );
}

function resetData(){

  if(!confirm('Delete all data?')) return;

  localStorage.removeItem('activities');

  activities = [];

  renderHistory();
  updateStats();
  updateChart();

  document.getElementById('status').innerText =
  'All data deleted';
}

let map;
let marker;
let routeLine;
let watchId;
let routeCoordinates = [];

function initMap(){

  map = L.map('map')
    .setView([11.0168,76.9558],13);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      attribution:'OpenStreetMap'
    }
  ).addTo(map);
}

function startTracking(){

  if(!navigator.geolocation){

    alert('GPS not supported');

    return;
  }

  watchId =
  navigator.geolocation.watchPosition(

    position=>{

      const lat =
      position.coords.latitude;

      const lng =
      position.coords.longitude;

      routeCoordinates.push([lat,lng]);

      if(marker){

        marker.setLatLng([lat,lng]);

      }else{

        marker =
        L.marker([lat,lng]).addTo(map);
      }

      map.setView([lat,lng],16);

      if(routeLine){
        routeLine.remove();
      }

      routeLine =
      L.polyline(
        routeCoordinates,
        {
          weight:5
        }
      ).addTo(map);
    },

    error=>{

      alert('Location error');
    },

    {
      enableHighAccuracy:true,
      maximumAge:0,
      timeout:5000
    }
  );
}

function stopTracking(){

  navigator.geolocation.clearWatch(watchId);

  alert('Tracking stopped');
}

renderHistory();
updateStats();
updateChart();
initMap();

</script>

</body>
</html>
